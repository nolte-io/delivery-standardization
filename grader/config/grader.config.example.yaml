# Nolte Delivery Grader — example config
#
# Copy this file to `grader.config.yaml` (git-ignored) and fill in real values locally.
# Never commit real Jira instance URLs, account IDs, or tokens to the repo.

jira:
  instance_url: "https://YOUR-INSTANCE.atlassian.net"
  service_account_email: "grader@example.com"
  # Token read from environment: JIRA_API_TOKEN

projects:
  include:
    - "PROJ"   # Replace with real Jira project keys
  exclude: []

authorized_approvers:
  # accountIds can be discovered via Jira's /rest/api/3/user/search endpoint
  default:
    - accountId: "PLACEHOLDER_HEAD_OF_ENG"
      role: "head_of_engineering"
    - accountId: "PLACEHOLDER_HEAD_OF_PRODUCT"
      role: "head_of_product_delegate"
  per_project:
    # Example override: client POC authorized to approve on a specific engagement
    # PROJ:
    #   - accountId: "PLACEHOLDER_CLIENT_POC"
    #     role: "client_poc"

dimensions:
  enabled:
    - "Y1"
    - "Y2"
    - "Y3"
    - "Y4"
    - "Y5"
    - "Y6"
    - "U7"
    - "U8"
    - "U9"
    - "U10"
    - "U11"
    - "U12"
    - "C1"
    - "C2"
    - "C3"
    - "D1"
    - "D2"
    - "D3"
    - "D4"
    - "D5"
    - "D6"
    - "D7"
    - "D8"
    - "D9"
    - "D10"

thresholds:
  cycle_time_days: 7
  wip_limits:
    in_specification: 8
    ready: 5
    in_implementation_per_engineer: 3
    in_implementation_system: 15
    done_implementing: 5
    in_validation: 6

conventions:
  template_sections:
    - "## Business Objective"
    - "## Observable Impact"
    - "## Acceptance Criteria"
    - "## Scenarios"
    - "## Risks"
  test_subtask_title_pattern: "^Tests — [A-Z]+-\\d+$"

custom_fields:
  # Field names (not IDs). The grader discovers IDs by name on first run.
  design_artifact_link: "Design Artifact Link"
  production_release_reference: "Production Release Reference"
  impact_measurement_link: "Impact Measurement Link"
  spec_approver: "Spec Approver"

teams:
  # Team size per project drives Y4 TEAM_SIZE_EXCEPTION.
  # Source of truth: config, not sub-task assignee count.
  # TEAM_SIZE_EXCEPTION fires when size == 1 for the project.
  default:
    size: 5
  per_project: {}
  # per_project:
  #   TINY: { size: 1 }

judge:
  model: "claude-sonnet-4-6"
  temperature: 0
  max_tokens: 1000
  cache_enabled: true
  # Optional: per-dimension model overrides. Example:
  # model_by_dimension:
  #   D3: "claude-opus-4-7"
  #   U11: "claude-opus-4-7"
  model_by_dimension: {}

output:
  directory: "./runs/{run_id}/"
  formats:
    - "json"
    - "csv"
    - "md"
